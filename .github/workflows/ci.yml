name: CI for Playwright Tests

on:
  push:
    branches:
      - main   # Execute o CI para pushes na branch "main"
  pull_request:
    branches:
      - main   # Execute o CI para PRs direcionadas à branch "main"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Configurar o repositório
    - name: Check out code
      uses: actions/checkout@v3

    # 2. Configurar o Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Use uma versão compatível com Playwright
        cache: 'npm'

    # 3. Instalar dependências
    - name: Install dependencies
      run: npm install

    # 4. Executar os testes
    - name: Run Playwright Tests
      run: npx playwright test

    # 5. Gerar e armazenar relatórios
    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-report
        path: playwright-report/

    # 6. Relatórios Allure (opcional)
    - name: Generate Allure Report
      run: |
        allure generate allure-results --clean -o allure-report
        allure open allure-report